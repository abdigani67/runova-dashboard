<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Data deletion status · Runova</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --aubergine:#3a1b4e; --aubergine-deep:#2a1338; --aubergine-700:#4a2563;
    --gold:#c9a86a; --ink:#1b1620; --ink-2:#4b4452; --ink-3:#736c7d;
    --muted:#a39bab; --bg:#f7f5f8; --surface:#ffffff; --line:#ece8ef;
    --shadow:0 1px 3px rgba(27,22,32,.06),0 4px 14px rgba(27,22,32,.05);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;line-height:1.55;letter-spacing:-.006em;
    min-height:100vh;display:grid;place-items:center;padding:24px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;
    box-shadow:var(--shadow);max-width:460px;width:100%;padding:38px 34px}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:24px}
  .brand-mark{width:30px;height:30px;border-radius:8px;
    background:linear-gradient(150deg,var(--aubergine-700),var(--aubergine));
    display:grid;place-items:center;box-shadow:inset 0 0 0 1px rgba(201,168,106,.35)}
  .brand-name{font-weight:700;font-size:17px}
  .tick{width:44px;height:44px;border-radius:50%;background:rgba(10,125,59,.09);
    display:grid;place-items:center;margin-bottom:16px}
  h1{font-family:'Fraunces',Georgia,serif;font-size:22px;font-weight:600;
    letter-spacing:-.01em;margin:0 0 8px}
  p{font-size:14px;color:var(--ink-2);margin:0 0 14px}
  .code-label{font-size:11px;text-transform:uppercase;letter-spacing:.09em;
    color:var(--muted);font-weight:600;margin-bottom:5px}
  .code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13.5px;
    background:var(--bg);border:1px solid var(--line);border-radius:9px;
    padding:11px 13px;color:var(--ink);word-break:break-all}
  .foot{font-size:12.5px;color:var(--ink-3);margin-top:22px;margin-bottom:0}
  a{color:var(--aubergine-700);font-weight:500}
</style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <span class="brand-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 19V7a4 4 0 014-4h2a4 4 0 010 8H9" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 11l5 8" stroke="#c9a86a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      <span class="brand-name">Runova</span>
    </div>
    <div class="tick"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="#0a7d3b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <h1>Data deletion request received</h1>
    <p id="msg">Any Instagram data associated with this request has been removed from Runova.</p>
    <div id="codeBlock" style="display:none">
      <div class="code-label">Confirmation code</div>
      <div class="code" id="code"></div>
    </div>
    <p class="foot">Questions? Contact <a href="mailto:runova.ai3@gmail.com">runova.ai3@gmail.com</a>.</p>
  </main>
  <script>
    // Show the confirmation code from ?code= (plain text, no injection).
    var code = new URLSearchParams(location.search).get('code');
    if (code) {
      document.getElementById('code').textContent = code;
      document.getElementById('codeBlock').style.display = 'block';
      document.getElementById('msg').textContent =
        'Data deletion request ' + code + ' received. Any Instagram data associated with this request has been removed from Runova.';
    }
  </script>
</body>
</html>
