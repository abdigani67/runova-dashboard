<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runova</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://udlmobdkxorxwzelhmeo.supabase.co" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* Brand: aubergine + champagne-gold hairline */
  --aubergine:#3a1b4e;
  --aubergine-deep:#2a1338;
  --aubergine-700:#4a2563;
  --gold:#c9a86a;
  --gold-soft:#e3cd9e;
  --ink:#1b1620;
  --ink-2:#4b4452;
  --ink-3:#736c7d;
  --muted:#a39bab;
  --bg:#f7f5f8;
  --surface:#ffffff;
  --line:#ece8ef;
  --line-2:#f5f2f7;
  --hot:#bb362c;--hot-bg:#fbece9;
  --warm:#9a6311;--warm-bg:#faf0db;
  --cold:#2f5d85;--cold-bg:#e9f1f8;
  --good:#1c7a52;--good-bg:#e7f5ed;
  --shadow-xs:0 1px 2px rgba(27,22,32,.05);
  --shadow:0 1px 3px rgba(27,22,32,.06),0 4px 14px rgba(27,22,32,.05);
  --shadow-lg:0 24px 60px rgba(27,22,32,.22);
  --r:14px;--r-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5;letter-spacing:-.006em}
.serif{font-family:'Fraunces',Georgia,serif}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ───── LOGIN ───── */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;background:radial-gradient(900px 500px at 50% -20%,#4a2563 0%,transparent 60%),linear-gradient(160deg,#2a1338,#3a1b4e 60%,#22102e)}
.login-page::after{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,106,.4),transparent);max-width:340px;margin:0 auto}
.login-card{position:relative;background:var(--surface);border-radius:18px;padding:42px 38px;width:100%;max-width:392px;box-shadow:var(--shadow-lg);z-index:1}
.login-brand{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.brand-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(150deg,var(--aubergine-700),var(--aubergine));display:grid;place-items:center;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(201,168,106,.35)}
.brand-mark svg{width:16px;height:16px}
.login-brand .wm{font-size:21px;font-weight:700;letter-spacing:-.02em}
.login-title{font-family:'Fraunces',serif;font-size:23px;font-weight:600;margin-bottom:5px;letter-spacing:-.01em}
.login-sub{font-size:14px;color:var(--ink-3);margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--ink-2)}
.field input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;outline:none;background:var(--surface);transition:border-color .15s,box-shadow .15s}
.field input:focus{border-color:var(--aubergine-700);box-shadow:0 0 0 3px rgba(74,37,99,.1)}
.login-btn{width:100%;padding:13px;background:linear-gradient(150deg,var(--aubergine-700),var(--aubergine));color:#fff;border:none;border-radius:10px;font-size:14.5px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:6px;transition:transform .12s,box-shadow .2s;box-shadow:0 4px 16px rgba(58,27,78,.3)}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(58,27,78,.36)}
.login-btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.login-err{background:var(--hot-bg);border:1px solid #f0c8c3;color:var(--hot);padding:9px 13px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}

/* ───── APP LAYOUT ───── */
.app{display:none;min-height:100vh}
.shell{display:grid;grid-template-columns:236px 1fr;min-height:100vh}

/* Sidebar */
.sidebar{background:linear-gradient(180deg,var(--aubergine) 0%,var(--aubergine-deep) 100%);color:#fff;padding:22px 16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sb-brand{display:flex;align-items:center;gap:10px;padding:4px 8px 22px;margin-bottom:6px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-brand .wm{font-size:19px;font-weight:700;letter-spacing:-.02em;color:#fff}
.sb-brand .brand-mark{box-shadow:inset 0 0 0 1px rgba(201,168,106,.45)}
.sb-section{font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:rgba(255,255,255,.38);font-weight:600;padding:18px 10px 8px}
.sb-nav{display:flex;flex-direction:column;gap:2px}
.sb-link{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:9px;font-size:13.5px;font-weight:500;color:rgba(255,255,255,.66);cursor:pointer;border:none;background:none;font-family:inherit;text-align:left;width:100%;transition:background .14s,color .14s}
.sb-link svg{width:17px;height:17px;stroke:currentColor;flex-shrink:0;opacity:.9}
.sb-link:hover{background:rgba(255,255,255,.07);color:#fff}
.sb-link.active{background:rgba(255,255,255,.1);color:#fff}
.sb-link.active::before{content:'';position:absolute;left:0;width:3px;height:20px;border-radius:0 3px 3px 0;background:var(--gold)}
.sb-link{position:relative}
.sb-foot{margin-top:auto;padding:14px 10px 4px;border-top:1px solid rgba(255,255,255,.08)}
.sb-clinic{font-size:13px;font-weight:600;color:#fff;margin-bottom:2px}
.sb-conn{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;color:rgba(255,255,255,.5);margin-bottom:12px}
.sb-conn .dot{width:6px;height:6px;border-radius:50%;background:#cbb27e;transition:background .2s}
.sb-conn.live .dot{background:#6fd39e;box-shadow:0 0 0 3px rgba(111,211,158,.18)}
.sb-conn.offline .dot{background:#e0a04a}
.sb-signout{font-size:12.5px;color:rgba(255,255,255,.6);background:rgba(255,255,255,.08);border:none;border-radius:8px;padding:8px 12px;font-family:inherit;cursor:pointer;width:100%;transition:background .15s}
.sb-signout:hover{background:rgba(255,255,255,.16);color:#fff}

/* Mobile topbar (hidden on desktop) */
.mtop{display:none}

/* Content */
.content{padding:30px 34px 60px;max-width:1080px}
.tab-enter{animation:fadeUp .34s cubic-bezier(.22,1,.36,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.page-title{font-family:'Fraunces',serif;font-size:24px;font-weight:600;letter-spacing:-.01em;margin-bottom:3px}
.page-sub{font-size:13.5px;color:var(--ink-3);margin-bottom:26px}

/* ───── HERO ROW: big figure + chart ───── */
.hero-row{display:grid;grid-template-columns:1fr 1.4fr;gap:14px;margin-bottom:14px}
.hero-figure{background:linear-gradient(155deg,var(--aubergine) 0%,var(--aubergine-deep) 100%);border-radius:var(--r);padding:26px 28px;color:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;min-height:188px}
.hero-figure::before{content:'';position:absolute;top:-50%;right:-20%;width:280px;height:280px;background:radial-gradient(circle,rgba(201,168,106,.16),transparent 65%);pointer-events:none}
.hf-top{position:relative;z-index:1}
.hf-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--gold-soft);font-weight:600;margin-bottom:14px}
.hf-value{font-family:'Fraunces',serif;font-size:46px;font-weight:600;line-height:.95;letter-spacing:-.02em}
.hf-value .cur{color:var(--gold);font-size:28px;vertical-align:top;margin-right:1px}
.hf-foot{position:relative;z-index:1;font-size:12.5px;color:rgba(255,255,255,.6);line-height:1.5}
.hf-foot b{color:#fff;font-weight:600}
.chart-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;display:flex;flex-direction:column}
.chart-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
.chart-title{font-size:12.5px;font-weight:600;color:var(--ink-2)}
.chart-total{font-size:12.5px;color:var(--muted)}
.chart-wrap{flex:1;min-height:120px;position:relative}
.chart-wrap svg{width:100%;height:100%;display:block;overflow:visible}

/* ───── METRIC STRIP ───── */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
.metric{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;transition:box-shadow .15s,transform .15s}
.metric:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.metric-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.metric-label{font-size:12px;font-weight:500;color:var(--ink-3)}
.metric-ic{width:30px;height:30px;border-radius:8px;background:var(--bg);display:grid;place-items:center}
.metric-ic svg{width:15px;height:15px;stroke:var(--aubergine-700)}
.metric-val{font-family:'Fraunces',serif;font-size:32px;font-weight:600;line-height:1;letter-spacing:-.01em}
.metric-sub{font-size:12px;color:var(--muted);margin-top:6px}
.metric.flash{animation:metricFlash 1.5s ease-out}
@keyframes metricFlash{0%{box-shadow:0 0 0 2px var(--gold)}100%{box-shadow:var(--shadow-xs)}}

/* ───── PANELS ───── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:22px}
.panel-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.panel-title{font-size:13px;font-weight:600;letter-spacing:-.01em}
.panel-action{font-size:12.5px;color:var(--aubergine-700);cursor:pointer;font-weight:500}
.panel-action:hover{color:var(--aubergine)}

/* Pipeline */
.funnel{display:flex;flex-direction:column;gap:15px}
.f-step{display:flex;align-items:center;gap:13px}
.f-label{font-size:13px;color:var(--ink-2);width:52px;flex-shrink:0;font-weight:500}
.f-bar-wrap{flex:1;height:8px;background:var(--line-2);border-radius:5px;overflow:hidden}
.f-bar{height:100%;border-radius:5px;transition:width .7s cubic-bezier(.22,1,.36,1)}
.f-count{font-size:14px;font-weight:600;width:24px;text-align:right;flex-shrink:0}

/* Glance */
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line-2)}
.stat-row:last-child{border-bottom:none}
.stat-lbl{font-size:13.5px;color:var(--ink-3)}
.stat-val{font-size:14px;font-weight:600}
.stat-val.good{color:var(--good)}

/* Attention */
.attention-list{display:flex;flex-direction:column}
.a-item{display:flex;align-items:center;gap:13px;padding:14px 0;border-bottom:1px solid var(--line-2)}
.a-item:first-child{padding-top:0}.a-item:last-child{border-bottom:none;padding-bottom:0}
.a-body{flex:1;min-width:0}
.a-handle{font-size:13.5px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:8px}
.a-msg{font-size:12.5px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.a-meta{font-size:11.5px;color:var(--muted);margin-top:3px}
.a-btn{background:var(--surface);color:var(--aubergine-700);border:1px solid var(--line);padding:7px 13px;border-radius:8px;font-size:12.5px;font-family:inherit;cursor:pointer;font-weight:500;flex-shrink:0;transition:background .15s,border-color .15s}
.a-btn:hover{background:var(--bg);border-color:var(--gold)}

/* ───── BADGES ───── */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:7px;font-size:11.5px;font-weight:600;white-space:nowrap;text-transform:capitalize}
.pill .pdot{width:5px;height:5px;border-radius:50%}
.temp-hot{background:var(--hot-bg);color:var(--hot)}.temp-hot .pdot{background:var(--hot)}
.temp-warm{background:var(--warm-bg);color:var(--warm)}.temp-warm .pdot{background:var(--warm)}
.temp-cold{background:var(--cold-bg);color:var(--cold)}.temp-cold .pdot{background:var(--cold)}
.sent-positive{color:var(--good);font-weight:600}
.sent-neutral{color:var(--muted);font-weight:600}
.sent-negative,.sent-frustrated,.sent-angry{color:var(--hot);font-weight:600}
.badge{display:inline-block;padding:3px 9px;border-radius:7px;font-size:11.5px;font-weight:600;text-transform:capitalize}
.badge-new,.badge-new_lead{background:var(--bg);color:var(--ink-2)}
.badge-warm{background:var(--warm-bg);color:var(--warm)}
.badge-hot{background:var(--hot-bg);color:var(--hot)}
.badge-active,.badge-enquiry{background:var(--cold-bg);color:var(--cold)}
.badge-booked,.badge-booked_intent{background:var(--good-bg);color:var(--good)}
.badge-human,.badge-staff{background:var(--warm-bg);color:var(--warm)}
.badge-ai{background:var(--bg);color:var(--ink-2)}
.badge-sold,.badge-attended{background:var(--good-bg);color:var(--good)}
.badge-other,.badge-{background:#f0eef3;color:#6b6775}
/* Small pill button to return a lead from staff back to the AI */
.pill-handback{display:inline-flex;align-items:center;gap:4px;margin-left:7px;padding:3px 11px;border-radius:999px;font-size:11px;font-weight:600;font-family:inherit;border:1px solid var(--line);background:var(--surface);color:var(--aubergine-700);cursor:pointer;vertical-align:middle;white-space:nowrap;transition:border-color .14s,background .14s,color .14s}
.pill-handback:hover{border-color:var(--gold);background:var(--bg)}
.pill-handback:disabled{opacity:.55;cursor:default}
/* Stage cell holds the badge + "Hand back to AI" pill — don't clip it */
.td-stage{max-width:none;overflow:visible;white-space:nowrap}

/* ───── LEADS TABLE ───── */
.filter-row{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap}
.fpill{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--line);background:var(--surface);color:var(--ink-3);cursor:pointer;font-family:inherit;transition:all .15s}
.fpill:hover{border-color:var(--gold);color:var(--ink-2)}
.fpill.active{background:var(--aubergine);border-color:var(--aubergine);color:#fff}
.table-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:12px 18px;border-bottom:1px solid var(--line);white-space:nowrap;font-weight:600;background:#fcfbfd}
td{padding:14px 18px;font-size:13px;border-bottom:1px solid var(--line-2);max-width:210px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink-2)}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover td{background:#fcfbfd}
.td-handle{font-weight:600;color:var(--ink)}
/* Hot + waiting-for-staff = highest priority: gold left accent + light gold tint */
.lead-priority td{background:#fdf7ea}
.lead-priority td:first-child{box-shadow:inset 3px 0 0 0 #d9a94e}
tbody tr.lead-priority:hover td{background:#fbf0d6}
/* Relative "time ago" under the last message */
.time-ago{font-size:11px;color:var(--muted);margin-top:2px;display:block}
.oc-tags{display:inline-flex;gap:6px;align-items:center}
.oc-btn{background:var(--surface);color:var(--ink-2);border:1px solid var(--line);padding:4px 11px;border-radius:7px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .13s;white-space:nowrap}
.oc-btn:hover{border-color:var(--gold);background:var(--bg)}
.oc-sold-btn:hover{border-color:var(--good);color:var(--good);background:var(--good-bg)}
.oc-done{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.oc-done.oc-sold{background:var(--good-bg);color:var(--good)}
.oc-done.oc-lost{background:#f0eef3;color:var(--ink-3)}
.oc-done:hover{opacity:.72}

/* ───── MODAL ───── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(27,22,32,.46);backdrop-filter:blur(3px);z-index:200;align-items:center;justify-content:center;padding:24px}
.modal-overlay.open{display:flex;animation:fadeIn .18s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:600px;max-height:86vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modalUp .26s cubic-bezier(.22,1,.36,1)}
@keyframes modalUp{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}
.modal-hd{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-family:'Fraunces',serif;font-size:18px;font-weight:600}
.modal-close{background:var(--bg);border:1px solid var(--line);font-size:13px;cursor:pointer;color:var(--ink-3);width:30px;height:30px;border-radius:8px;transition:background .15s}
.modal-close:hover{background:var(--line-2)}
.modal-body{padding:24px}
.intel-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px}
.intel-item{background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 14px}
.intel-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:6px;font-weight:600}
.intel-value{font-size:14.5px;font-weight:600}
.summary-box{background:var(--bg);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:var(--r-sm);padding:15px;font-size:13px;line-height:1.6;color:var(--ink-2)}
.summary-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--aubergine-700);font-weight:700;margin-bottom:7px}
.btn-primary{background:var(--aubergine);color:#fff;border:none;padding:10px 17px;border-radius:9px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s}
.btn-primary:hover{background:var(--aubergine-700)}
.btn-secondary{background:var(--surface);color:var(--ink-2);border:1px solid var(--line);padding:10px 17px;border-radius:9px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s}
.btn-secondary:hover{background:var(--bg)}
.btn-good{background:var(--good-bg);color:var(--good);border:1px solid #bce3cd;padding:10px 17px;border-radius:9px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}

/* ───── CONVERSATIONS ───── */
.conv-layout{display:grid;grid-template-columns:286px 1fr;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--surface);min-height:580px}
.conv-sidebar{border-right:1px solid var(--line);overflow-y:auto;max-height:680px}
.conv-sidebar-hd{padding:15px 17px;border-bottom:1px solid var(--line);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);position:sticky;top:0;background:var(--surface)}
.conv-item{padding:14px 17px;border-bottom:1px solid var(--line-2);cursor:pointer;transition:background .1s;border-left:2px solid transparent}
.conv-item:hover{background:var(--bg)}
.conv-item.active{background:var(--bg);border-left-color:var(--gold)}
.conv-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;gap:8px}
.conv-item-handle{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-item-temp{flex-shrink:0}
.conv-item-preview{font-size:12px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-item-time{font-size:11px;color:var(--muted);margin-top:3px}
.conv-main{display:flex;flex-direction:column}
.conv-hd{padding:16px 20px;border-bottom:1px solid var(--line)}
.conv-hd-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.conv-hd-handle{font-size:15px;font-weight:600;letter-spacing:-.01em}
.conv-hd-meta{font-size:12px;color:var(--muted);margin-top:4px}
.conv-messages{flex:1;padding:20px;overflow-y:auto;max-height:540px;display:flex;flex-direction:column;gap:11px;background:var(--bg)}
.msg-row{display:flex}
.msg-row.user{justify-content:flex-start}
.msg-row.ai,.msg-row.staff{justify-content:flex-end}
.msg-bubble{max-width:74%;padding:10px 13px;border-radius:13px;font-size:13px;line-height:1.5}
.msg-row.user .msg-bubble{background:var(--surface);color:var(--ink);border:1px solid var(--line);border-bottom-left-radius:4px}
.msg-row.ai .msg-bubble{background:var(--aubergine);color:#fff;border-bottom-right-radius:4px}
.msg-row.staff .msg-bubble{background:var(--good);color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:10.5px;color:var(--muted);margin-top:4px}
.msg-row.ai .msg-time,.msg-row.staff .msg-time{text-align:right}
.conv-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);min-height:400px;font-size:13.5px}
.conv-empty svg{width:30px;height:30px;stroke:var(--line);stroke-width:1.5}

/* ───── TREATMENTS ───── */
.treatments-note{margin-bottom:18px;font-size:13.5px;color:var(--ink-3);line-height:1.6}
.treatments-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(256px,1fr));gap:13px}
.treatment-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:20px;transition:box-shadow .15s,transform .15s}
.treatment-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.treatment-card .topline{height:3px;width:34px;border-radius:3px;background:var(--gold);margin-bottom:14px}
.treatment-name{font-size:15.5px;font-weight:600;margin-bottom:4px}
.treatment-price{font-family:'Fraunces',serif;font-size:23px;font-weight:600;margin-bottom:12px;letter-spacing:-.01em}
.treatment-meta{font-size:12.5px;color:var(--ink-3);line-height:1.7}
/* Treatments management: add button, inactive cards, per-card actions, form */
.tbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.btn-add{display:inline-flex;align-items:center;gap:7px;background:var(--aubergine);color:#fff;border:none;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s;flex-shrink:0}
.btn-add:hover{background:var(--aubergine-700)}
.btn-add svg{width:15px;height:15px;stroke:#fff;stroke-width:2.4}
.treatment-card.inactive{opacity:.6;background:var(--bg)}
.tc-badge{display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3);background:var(--line-2);border:1px solid var(--line);padding:2px 7px;border-radius:6px;margin-left:6px;vertical-align:middle}
.tc-actions{display:flex;gap:7px;margin-top:14px;padding-top:13px;border-top:1px solid var(--line-2)}
.tc-btn{background:var(--surface);color:var(--ink-2);border:1px solid var(--line);padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:border-color .13s,background .13s,color .13s}
.tc-btn:hover{border-color:var(--gold);background:var(--bg)}
.tc-btn.danger:hover{border-color:var(--hot);color:var(--hot);background:var(--hot-bg)}
.tc-btn:disabled{opacity:.55;cursor:default}
.field textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;outline:none;background:var(--surface);resize:vertical;min-height:60px;transition:border-color .15s,box-shadow .15s}
.field textarea:focus{border-color:var(--aubergine-700);box-shadow:0 0 0 3px rgba(74,37,99,.1)}
.tm-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:520px){.tm-row{grid-template-columns:1fr}}
/* ── Settings ── */
.field select{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;outline:none;background:var(--surface);color:var(--ink);cursor:pointer;transition:border-color .15s,box-shadow .15s}
.field select:focus{border-color:var(--aubergine-700);box-shadow:0 0 0 3px rgba(74,37,99,.1)}
.set-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.set-row{grid-template-columns:1fr}}
.set-hd{display:flex;align-items:center;gap:9px;margin-bottom:18px}
.set-hd svg{width:18px;height:18px;stroke:var(--aubergine-700);flex-shrink:0}
.set-hd .panel-title{font-size:14px}
.tone-preview{font-size:12.5px;color:var(--ink-3);margin-top:7px;line-height:1.5;font-style:italic}
.field-hint{font-size:12px;color:var(--muted);margin-top:6px}
.set-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:4px}
.sk{background:linear-gradient(90deg,var(--line-2) 25%,var(--line) 37%,var(--line-2) 63%);background-size:400% 100%;animation:skl 1.4s ease infinite;border-radius:8px}
@keyframes skl{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* ───── MISC ───── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px;gap:14px}
.spinner{width:28px;height:28px;border:2.5px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:13px;color:var(--muted)}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13.5px}
.empty svg{width:30px;height:30px;stroke:var(--line);stroke-width:1.5;margin-bottom:10px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--ink);color:#fff;padding:11px 19px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);z-index:300;opacity:0;transition:transform .3s cubic-bezier(.22,1,.36,1),opacity .3s}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:980px){
  .shell{grid-template-columns:1fr}
  .sidebar{display:none}
  .mtop{display:flex;align-items:center;justify-content:space-between;background:var(--aubergine);color:#fff;padding:0 18px;height:56px;position:sticky;top:0;z-index:100}
  .mtop .wm{font-size:17px;font-weight:700;display:flex;align-items:center;gap:9px}
  .mnav{display:flex;gap:18px;background:var(--surface);border-bottom:1px solid var(--line);padding:0 18px;overflow-x:auto;position:sticky;top:56px;z-index:90}
  .mnav button{padding:13px 0;font-size:13.5px;font-weight:500;color:var(--ink-3);border:none;background:none;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;white-space:nowrap}
  .mnav button.active{color:var(--ink);border-bottom-color:var(--gold);font-weight:600}
  .content{padding:22px 18px 52px}
  .hero-row,.metrics,.grid-2{grid-template-columns:1fr}
  .intel-grid{grid-template-columns:1fr 1fr}
  .conv-layout{grid-template-columns:1fr}.conv-sidebar{max-height:260px}
}
.mnav{display:none}
@media(max-width:980px){.mnav{display:flex}}
@media(max-width:520px){.metrics{grid-template-columns:1fr}.intel-grid{grid-template-columns:1fr}}

/* ───── ACCOUNT TAB ───── */
.acct-card{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.acct-avatar{width:84px;height:84px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--line);border:1px solid var(--line)}
.acct-avatar-fallback{width:84px;height:84px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;background:linear-gradient(135deg,#f7d9b8,#e6a3c9,#9a6ad1);color:#fff;font-family:'Fraunces',serif;font-size:32px;font-weight:600}
.acct-id{min-width:0;flex:1}
.acct-handle{font-family:'Fraunces',serif;font-size:22px;font-weight:600;letter-spacing:-.01em;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.acct-verified{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#0a7d3b;background:rgba(10,125,59,.09);padding:3px 9px;border-radius:999px}
.acct-name{font-size:14px;color:var(--ink-2);margin-top:2px}
.acct-idrow{font-size:12px;color:var(--muted);margin-top:6px;font-variant-numeric:tabular-nums;word-break:break-all}
.acct-bio{font-size:13.5px;color:var(--ink-2);margin-top:14px;line-height:1.55;white-space:pre-wrap}
.acct-stats{display:flex;gap:28px;margin-top:18px;flex-wrap:wrap}
.acct-stat .num{font-family:'Fraunces',serif;font-size:22px;font-weight:600;letter-spacing:-.01em}
.acct-stat .lbl{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;margin-top:1px}
.media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
.media-cell{position:relative;aspect-ratio:1;border-radius:var(--r-sm);overflow:hidden;background:var(--line-2);border:1px solid var(--line);display:block;text-decoration:none}
.media-cell img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s ease}
.media-cell:hover img{transform:scale(1.05)}
.media-cell .media-tag{position:absolute;top:7px;right:7px;background:rgba(27,22,32,.62);color:#fff;font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;backdrop-filter:blur(2px)}
.media-cell .media-cap{position:absolute;left:0;right:0;bottom:0;padding:16px 9px 8px;background:linear-gradient(transparent,rgba(27,22,32,.72));color:#fff;font-size:11px;line-height:1.35;opacity:0;transition:opacity .2s}
.media-cell:hover .media-cap{opacity:1}
.acct-conn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#0a7d3b;background:rgba(10,125,59,.09);padding:5px 11px;border-radius:999px}
.acct-conn .dot{width:7px;height:7px;border-radius:50%;background:#0a7d3b}
@media(max-width:520px){.media-grid{gap:7px}.acct-stats{gap:20px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="login-brand">
      <span class="brand-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M5 19V7a4 4 0 014-4h2a4 4 0 010 8H9" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 11l5 8" stroke="#c9a86a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      <span class="wm">Runova</span>
    </div>
    <div class="login-title">Sign in</div>
    <div class="login-sub">Your AI receptionist dashboard.</div>
    <div class="login-err" id="loginErr"></div>
    <div class="field"><label>Email</label><input type="email" id="emailIn" autocomplete="email" placeholder="you@clinic.com"></div>
    <div class="field"><label>Password</label><input type="password" id="passIn" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign in</button>
  </div>
</div>

<!-- LEAD MODAL -->
<div class="modal-overlay" id="leadModal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="modalTitle">Lead detail</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- TREATMENT ADD/EDIT MODAL -->
<div class="modal-overlay" id="treatmentModal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="tmTitle">Add treatment</div>
      <button class="modal-close" onclick="closeTreatmentModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="login-err" id="tmErr"></div>
      <div class="field"><label>Treatment name *</label><input id="tmName" type="text" placeholder="e.g. Lip filler — 1ml"></div>
      <div class="tm-row">
        <div class="field"><label>Price from (£)</label><input id="tmPriceFrom" type="number" min="0" inputmode="numeric" placeholder="150"></div>
        <div class="field"><label>Price to (£)</label><input id="tmPriceTo" type="number" min="0" inputmode="numeric" placeholder="optional"></div>
        <div class="field"><label>Duration (mins)</label><input id="tmDuration" type="number" min="0" inputmode="numeric" placeholder="30"></div>
      </div>
      <div class="field"><label>Recovery time</label><input id="tmRecovery" type="text" placeholder="e.g. 24–48 hours"></div>
      <div class="field"><label>Description</label><textarea id="tmDesc" placeholder="What the treatment involves…"></textarea></div>
      <div class="field"><label>FAQ</label><textarea id="tmFaq" placeholder="Common questions the AI should be able to answer…"></textarea></div>
      <div class="field"><label>Contraindications ⚠</label><textarea id="tmContra" placeholder="Who should NOT have this treatment — the AI will use this to keep patients safe."></textarea></div>
      <div style="display:flex;gap:9px;margin-top:6px">
        <button class="btn-primary" id="tmSaveBtn" onclick="saveTreatment()">Save treatment</button>
        <button class="btn-secondary" onclick="closeTreatmentModal()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title">Import treatments</div>
      <button class="modal-close" onclick="closeImportModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="login-err" id="imErr"></div>
      <div id="imStepSource">
        <div class="field"><label>Booking page URL</label><input id="imUrl" type="url" placeholder="https://www.fresha.com/..."></div>
        <div class="field-hint" style="margin:-4px 0 14px">Fresha URLs only for now. On another platform, or if the fetch gets blocked, paste your price list below instead.</div>
        <div class="field" style="margin-bottom:0"><label>…or paste your price list</label><textarea id="imText" rows="6" placeholder="Paste your treatment names and prices, one per line…"></textarea></div>
        <div style="display:flex;gap:9px;margin-top:14px">
          <button class="btn-primary" id="imPreviewBtn" onclick="previewImport()">Preview import</button>
          <button class="btn-secondary" onclick="closeImportModal()">Cancel</button>
        </div>
      </div>
      <div id="imStepPreview" style="display:none">
        <div class="field-hint" id="imPreviewSummary" style="margin-bottom:12px"></div>
        <div id="imPreviewList" style="max-height:340px;overflow:auto;margin-bottom:14px"></div>
        <div style="display:flex;gap:9px">
          <button class="btn-primary" id="imConfirmBtn" onclick="confirmImport()">Confirm import</button>
          <button class="btn-secondary" onclick="backToImportSource()">Back</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <!-- mobile top bar -->
  <div class="mtop">
    <span class="wm"><span class="brand-mark" style="width:26px;height:26px"><svg viewBox="0 0 24 24" fill="none"><path d="M5 19V7a4 4 0 014-4h2a4 4 0 010 8H9" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 11l5 8" stroke="#c9a86a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Runova</span>

  <div class="shell">
    <!-- sidebar -->
    <aside class="sidebar">
      <div class="sb-brand">
        <span class="brand-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M5 19V7a4 4 0 014-4h2a4 4 0 010 8H9" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 11l5 8" stroke="#c9a86a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <span class="wm">Runova</span>
      </div>

        <button class="sb-link" onclick="showTab('leads',this)"><svg viewBox="0 0 24 24" fill="none"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2" stroke-width="1.8" stroke-linecap="round"/><circle cx="9" cy="7" r="4" stroke-width="1.8"/><path d="M22 21v-2a4 4 0 00-3-3.87" stroke-width="1.8" stroke-linecap="round"/></svg>Leads</button>
        <button class="sb-link" onclick="showTab('conversations',this)"><svg viewBox="0 0 24 24" fill="none"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Conversations</button>
        <button class="sb-link" onclick="showTab('treatments',this)"><svg viewBox="0 0 24 24" fill="none"><path d="M10.5 20.5L3.5 13.5a5 5 0 017-7L11 7l.5-.5a5 5 0 017 7l-7 7a1 1 0 01-1 0z" stroke-width="1.8" stroke-linejoin="round"/></svg>Treatments</button>
        <button class="sb-link" onclick="showTab('account',this)"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="5" stroke-width="1.8"/><circle cx="12" cy="12" r="4" stroke-width="1.8"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>Account</button>
        <button class="sb-link" onclick="showTab('settings',this)"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke-width="1.8"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Settings</button>
      </nav>
      <div class="sb-foot">
        <div class="sb-clinic" id="sbClinic">—</div>
        <div class="sb-conn" id="connBadge"><span class="dot"></span><span id="connText">Connecting…</span></div>
        <button class="sb-signout" onclick="doSignOut()">Sign out</button>
      </div>
    </aside>

    <!-- content -->
    <main class="content">
      <div id="tab-overview"></div>
      <div id="tab-leads" style="display:none"></div>
      <div id="tab-conversations" style="display:none"></div>
      <div id="tab-treatments" style="display:none"></div>
      <div id="tab-account" style="display:none"></div>
      <div id="tab-settings" style="display:none"></div>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── AUTH ──
async function doLogin() {
  const email = document.getElementById('emailIn').value.trim();
  const pass = document.getElementById('passIn').value;
  const btn = document.getElementById('loginBtn');
  if (!email || !pass) { showErr('Enter your email and password.'); return; }
  btn.disabled = true; btn.textContent = 'Signing in…'; document.getElementById('loginErr').style.display='none';
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
  if (error) { showErr('That email or password didn\'t match. Try again.'); btn.disabled=false; btn.textContent='Sign in'; return; }
  startApp();
}
function showErr(msg){ const e=document.getElementById('loginErr'); e.textContent=msg; e.style.display='block'; }
async function doSignOut(){ stopPolling(); await supabaseClient.auth.signOut(); location.reload(); }
document.getElementById('passIn').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
supabaseClient.auth.getSession().then(async ({data:{session}}) => {
  if(session){ await startApp(); handleConnectRedirect(); }
});

// After returning from the Instagram OAuth round trip, the callback redirects to
// PORTAL_URL/?connected=1 (or ?connect_error=1). Surface the result, clean the
// URL, and open the Account tab so the freshly-connected profile renders.
function handleConnectRedirect(){
  const p = new URLSearchParams(location.search);
  if(p.get('connected')==='1'){
    toast('Instagram connected ✓', 2600);
    history.replaceState(null,'',location.pathname);
    showTab('account');
  } else if(p.get('connect_error')==='1'){
    toast('Instagram connection failed — please try again.', 3800);
    history.replaceState(null,'',location.pathname);
    showTab('account');
  }
}

// ── START ──
async function startApp(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('tab-overview').innerHTML = `<div class="loader"><div class="spinner"></div><div class="loader-text">Loading your dashboard…</div></div>`;
  // Resolve which clinic this login belongs to (RLS + clinic_users mapping)
  const ok = await resolveClinic();
  if(!ok) return;
  await loadAllData();
  renderOverview(); renderLeads(); renderConversations(); renderTreatments();
  resolveHandles();
  subscribeRealtime(); startPolling(); startTimeAgo();
}

// Find the logged-in user's clinic. Tries the my_clinic_id() helper first,
// then falls back to reading clinic_users directly. If neither resolves, the
// account isn't linked to a clinic yet — show a clear message instead of a blank page.
async function resolveClinic(){
  try{
    const rpc = await supabaseClient.rpc('my_clinic_id');
    if(rpc && rpc.data){ clinicId = rpc.data; return true; }
  }catch(e){ /* helper may not exist; fall through */ }
  try{
    const { data } = await supabaseClient.from('clinic_users').select('clinic_id').single();
    if(data && data.clinic_id){ clinicId = data.clinic_id; return true; }
  }catch(e){ /* fall through */ }
  document.getElementById('tab-overview').innerHTML =
    `<div class="empty" style="padding:60px 20px">${IC.inbox}<div style="font-size:15px;color:var(--ink-2);margin-bottom:6px">This account isn't linked to a clinic yet.</div><div>Ask your Runova contact to finish setup, then sign in again.</div></div>`;
  return false;
}

async function loadAllData(){
  const [c,l,v,t] = await Promise.all([
    supabaseClient.from('clinics').select('id,clinic_name,avg_treatment_value').eq('id',clinicId).single(),
    supabaseClient.from('leads').select('*').eq('clinic_id',clinicId).order('last_contact',{ascending:false}),
    supabaseClient.from('conversations').select('*').eq('clinic_id',clinicId).order('timestamp',{ascending:true}),
    supabaseClient.from('treatments').select('*').eq('clinic_id',clinicId).order('active',{ascending:false}).order('treatment_name',{ascending:true})
  ]);
  clinicData=c.data; allLeads=l.data||[]; allConvos=v.data||[]; allTreatments=t.data||[];
  if(clinicData) document.getElementById('sbClinic').textContent=clinicData.clinic_name;
  lastSignature=dataSignature();
}
function dataSignature(){
  return JSON.stringify({l:allLeads.map(x=>[x.id,x.lead_stage,x.lead_temperature,x.last_message,x.handoff_status,x.estimated_value]),c:allConvos.length,cl:allConvos.length?allConvos[allConvos.length-1].id:null});
}

// ── LIVE DATA: polling ──
// Re-fetch everything and re-render if anything changed. Used by the interval
// poll (fallback) and fired immediately when the tab regains focus so the view
// is never stale after switching away. Realtime handles the sub-second updates.
let refreshing=false;
async function refreshData(){
  if(!clinicId || refreshing) return;
  refreshing=true;
  try{
    const [l,v,c]=await Promise.all([
      supabaseClient.from('leads').select('*').eq('clinic_id',clinicId).order('last_contact',{ascending:false}),
      supabaseClient.from('conversations').select('*').eq('clinic_id',clinicId).order('timestamp',{ascending:true}),
      supabaseClient.from('clinics').select('id,clinic_name,avg_treatment_value').eq('id',clinicId).single()
    ]);
    const prev=allConvos.length;
    allLeads=l.data||[]; allConvos=v.data||[]; if(c.data) clinicData=c.data;
    const sig=dataSignature();
    if(sig!==lastSignature){ lastSignature=sig; const gotNew=allConvos.length>prev; rerenderActive(); resolveHandles(); if(gotNew) flashLiveCards(); }
    setConn('live');
  }catch(e){ setConn('offline'); }
  finally{ refreshing=false; }
}
function startPolling(){
  stopPolling();
  pollTimer=setInterval(()=>{ if(document.hidden) return; refreshData(); },12000);
}
function stopPolling(){ if(pollTimer){clearInterval(pollTimer);pollTimer=null;} }
// Refresh the instant the tab becomes visible / regains focus, instead of
// waiting up to 12s for the next poll tick.
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) refreshData(); });
window.addEventListener('focus',()=>refreshData());
function rerenderActive(){
  if(document.getElementById('leadModal').classList.contains('open')) return;
  if(document.getElementById('treatmentModal').classList.contains('open')) return;
  renderOverview();
  const vis=['leads','conversations','treatments'].find(t=>document.getElementById('tab-'+t).style.display!=='none');
  if(vis==='leads') renderLeads(); else if(vis==='conversations') renderConversations(); else if(vis==='treatments') renderTreatments();
}
function flashLiveCards(){ document.querySelectorAll('.metric').forEach(c=>{c.classList.remove('flash');void c.offsetWidth;c.classList.add('flash');}); }
function setConn(state){
  const b=document.getElementById('connBadge'),t=document.getElementById('connText'); if(!b) return;
  b.classList.remove('live','offline');
  if(state==='live'){b.classList.add('live');t.textContent='Live';}
  else if(state==='offline'){b.classList.add('offline');t.textContent='Reconnecting…';}
  else t.textContent='Connecting…';
}

// ── REALTIME ──
function subscribeRealtime(){
  realtimeSubs.forEach(s=>supabaseClient.removeChannel(s));
  const onLeads=(p)=>{
    if(p.eventType==='INSERT') allLeads.unshift(p.new);
    else if(p.eventType==='UPDATE'){const i=allLeads.findIndex(l=>l.id===p.new.id); if(i>=0) allLeads[i]=p.new; else allLeads.unshift(p.new);}
    else if(p.eventType==='DELETE') allLeads=allLeads.filter(l=>l.id!==p.old.id);
    lastSignature=dataSignature(); renderOverview(); if(document.getElementById('tab-leads').style.display!=='none') renderLeads();
  };
  const onConvo=(p)=>{ allConvos.push(p.new); lastSignature=dataSignature(); renderOverview(); if(document.getElementById('tab-conversations').style.display!=='none') renderConversations(); flashLiveCards(); };
  const ls=supabaseClient.channel('leads-rt').on('postgres_changes',{event:'*',schema:'public',table:'leads',filter:`clinic_id=eq.${clinicId}`},onLeads).subscribe((s)=>{ if(s==='SUBSCRIBED'){realtimeOk=true;setConn('live');} });
  const cs=supabaseClient.channel('convos-rt').on('postgres_changes',{event:'INSERT',schema:'public',table:'conversations',filter:`clinic_id=eq.${clinicId}`},onConvo).subscribe();
  realtimeSubs=[ls,cs];
  setTimeout(()=>{ if(!realtimeOk) setConn('live'); },4000);
}

// ── HELPERS ──
function tempBadge(t){ if(!t) return ''; const cls=t==='hot'?'temp-hot':t==='warm'?'temp-warm':'temp-cold'; return `<span class="pill ${cls}"><span class="pdot"></span>${t}</span>`; }
// Journey stage = WHERE the lead is in the booking process (distinct from temperature, which is how ready they are)
function journeyOf(l){
  if(l.lead_stage==='booked'||l.booked===true) return 'booked';
  if(l.handoff_status==='human') return 'staff';
  const msgs=allConvos.filter(c=>c.instagram_handle===l.instagram_handle).length;
  return msgs>1 ? 'active' : 'new';
}
const JOURNEY_LABEL={new:'New',active:'In chat',booked:'Booked',staff:'With staff'};
function sentClass(s){ return `sent-${s||'neutral'}`; }
function riskBadge(r){ if(!r) return '—'; const c=r==='high'?'color:var(--hot)':r==='medium'?'color:var(--warm)':'color:var(--good)'; return `<span style="font-weight:600;${c}">${r}</span>`; }
function toast(msg,dur){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),dur||2600); }
// Escape user-entered text before injecting as HTML (treatments are now client-editable)
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// Human-friendly "time ago" from a timestamp, e.g. "just now", "5 mins ago", "2h ago", "3d ago"
function timeAgo(ts){
  if(!ts) return '';
  const then=new Date(ts).getTime(); if(isNaN(then)) return '';
  const secs=Math.max(0,Math.round((Date.now()-then)/1000));
  if(secs<45) return 'just now';
  const mins=Math.round(secs/60);
  if(mins<60) return mins+(mins===1?' min ago':' mins ago');
  const hrs=Math.round(mins/60);
  if(hrs<24) return hrs+'h ago';
  const days=Math.round(hrs/24);
  if(days<7) return days+'d ago';
  const wks=Math.round(days/7);
  if(wks<5) return wks+'w ago';
  return new Date(ts).toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
}
// Refresh every rendered "time ago" label in place (no full re-render needed)
function refreshTimeAgo(){ document.querySelectorAll('.time-ago[data-ts]').forEach(el=>{ const ts=el.getAttribute('data-ts'); el.textContent=ts?timeAgo(ts):''; }); }
let timeAgoTimer=null;
function startTimeAgo(){ if(timeAgoTimer) return; timeAgoTimer=setInterval(refreshTimeAgo,60000); }

// The lead's last_contact column is stale (frozen at creation), so derive the
// real "last message" time from the most recent conversation for this handle.
function lastMessageTime(l){
  let bestMs=0, bestRaw=null;
  for(const c of allConvos){
    if(c.instagram_handle!==l.instagram_handle || !c.timestamp) continue;
    const ms=new Date(c.timestamp).getTime();
    if(!isNaN(ms) && ms>bestMs){ bestMs=ms; bestRaw=c.timestamp; }
  }
  return bestRaw || l.last_contact || l.updated_at || null;
}

// Instagram's messaging webhook only gives us a numeric sender ID. We resolve
// those to real @usernames on demand via the ig-usernames Edge Function (which
// uses the clinic's token server-side) and cache them here for readable labels.
let HANDLE_ALIASES = {};

const IG_USERNAMES_FN = SUPA_URL + '/functions/v1/ig-usernames';
// Resolve any numeric handles we don't yet have a username for, then re-render.
async function resolveHandles(){
  const known = HANDLE_ALIASES;
  const handles = [...new Set([
    ...allConvos.map(c=>c.instagram_handle),
    ...allLeads.map(l=>l.instagram_handle)
  ])].filter(h => h && /^\d+$/.test(h) && !known[h]);
  if(!handles.length) return;
  try{
    const { data:{ session } } = await supabaseClient.auth.getSession();
    if(!session) return;
    const res = await fetch(IG_USERNAMES_FN, {
      method:'POST',
      headers:{ 'Authorization':'Bearer '+session.access_token, 'apikey':ANON_KEY, 'Content-Type':'application/json' },
      body: JSON.stringify({ handles })
    });
    const data = await res.json().catch(()=>({}));
    if(data && data.resolved && Object.keys(data.resolved).length){
      HANDLE_ALIASES = { ...HANDLE_ALIASES, ...data.resolved };
      // Re-render the views that show handles.
      renderLeads();
      if(document.getElementById('tab-conversations').style.display!=='none') renderConversations();
      renderOverview();
    }
  }catch(e){ /* non-fatal: fall back to "IG User ####" */ }
}
// Show a readable name: alias first, then display_name; if the handle is a bare
// numeric IG ID, label it "IG User ####" so it doesn't read like a phone number.
function displayHandle(l){
  const h=(l.instagram_handle||'').trim();
  if(HANDLE_ALIASES[h]) return HANDLE_ALIASES[h];
  if(l.display_name && l.display_name.trim()) return l.display_name.trim();
  if(!h) return '—';
  if(/^\d+$/.test(h)) return 'IG User '+h.slice(-4);
  return h;
}
// Label for a conversation handle (looks up its lead for display_name/alias)
function handleLabel(h){
  const lead=allLeads.find(l=>l.instagram_handle===h);
  return displayHandle(lead||{instagram_handle:h});
}

// Build a 14-day enquiries area chart (inline SVG, no library)
function enquiriesChart(){
  const days=14, today=new Date(); today.setHours(0,0,0,0);
  const buckets=new Array(days).fill(0);
  allConvos.filter(c=>c.sender_type==='user').forEach(c=>{
    if(!c.timestamp) return; const d=new Date(c.timestamp); d.setHours(0,0,0,0);
    const diff=Math.round((today-d)/86400000); if(diff>=0&&diff<days) buckets[days-1-diff]++;
  });
  const total=buckets.reduce((a,b)=>a+b,0);
  const W=100,H=42,max=Math.max(...buckets,1);
  const pts=buckets.map((v,i)=>[ (i/(days-1))*W, H-(v/max)*(H-6)-3 ]);
  const line=pts.map((p,i)=>`${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const area=`${line} L${W},${H} L0,${H} Z`;
  return {svg:`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a86a" stop-opacity="0.28"/><stop offset="100%" stop-color="#c9a86a" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#ag)"/>
    <path d="${line}" fill="none" stroke="#3a1b4e" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>
    ${pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="0" fill="#3a1b4e"/>`).join('')}
  </svg>`, total};
}

// One-tap outcome control, shown only once a lead is booked (or already has an outcome)
function outcomeCell(l){
  const isBooked = l.lead_stage==='booked' || l.booked;
  if(!isBooked && !l.outcome) return '<span style="color:var(--muted)">—</span>';
  if(l.outcome==='sold') return `<span class="oc-done oc-sold" onclick="event.stopPropagation();setOutcome('${l.id}',null)" title="Tap to undo">✓ Sold</span>`;
  if(l.outcome==='lost') return `<span class="oc-done oc-lost" onclick="event.stopPropagation();setOutcome('${l.id}',null)" title="Tap to undo">Lost</span>`;
  // booked, no outcome yet → one-tap Sold
  return `<span class="oc-tags"><button class="oc-btn oc-sold-btn" onclick="event.stopPropagation();setOutcome('${l.id}','sold')">Sold</button><button class="oc-btn" onclick="event.stopPropagation();setOutcome('${l.id}','lost')">Lost</button></span>`;
}

// Return a lead from staff back to the AI. The Make DM engine's C1 guard only
// re-engages when BOTH ai_active=true AND handoff_status='ai', so we set both.
// Writes go through the anon key + RLS (no service-role key in the browser).
async function handBackToAI(leadId,btn){
  if(btn) btn.disabled=true;

      .update({ai_active:true, handoff_status:'ai'})
      .eq('id',leadId);

    if(lead){ lead.ai_active=true; lead.handoff_status='ai'; }
    lastSignature=dataSignature();

function tmNum(id){ const v=tmField(id).value.trim(); if(v==='') return null; const n=Math.round(Number(v)); return (isNaN(n)||n<0)?NaN:n; }
async function saveTreatment(){
  const err=tmField('tmErr');
  const name=tmField('tmName').value.trim();
  if(!name){ err.textContent='Treatment name is required.'; err.style.display='block'; tmField('tmName').focus(); return; }
  const price_from=tmNum('tmPriceFrom'), price_to=tmNum('tmPriceTo'), duration_mins=tmNum('tmDuration');
  if([price_from,price_to,duration_mins].some(v=>Number.isNaN(v))){ err.textContent='Prices and duration must be valid, non-negative numbers.'; err.style.display='block'; return; }
  const payload={ treatment_name:name, price_from, price_to, duration_mins,
    recovery_time:tmField('tmRecovery').value.trim(), description:tmField('tmDesc').value.trim(),
    faq:tmField('tmFaq').value.trim(), contraindications:tmField('tmContra').value.trim() };
  const btn=tmField('tmSaveBtn'); btn.disabled=true;
  try{
    if(editingTreatmentId){
      const {data,error}=await supabaseClient.from('treatments').update(payload).eq('id',editingTreatmentId).select().single();
      if(error){ err.textContent='Could not save — '+error.message; err.style.display='block'; btn.disabled=false; return; }
      const i=allTreatments.findIndex(x=>String(x.id)===String(editingTreatmentId)); if(i>=0&&data) allTreatments[i]=data;
      toast('Treatment updated ✓', 2000);
    }else{
      const {data,error}=await supabaseClient.from('treatments').insert({...payload, clinic_id:clinicId, active:true}).select().single();
      if(error){ err.textContent='Could not add — '+error.message; err.style.display='block'; btn.disabled=false; return; }
      if(data) allTreatments.unshift(data);
      toast('Treatment added ✓', 2000);
    }
    closeTreatmentModal(); renderTreatments();
  }catch(e){ err.textContent='Could not save — '+e.message; err.style.display='block'; btn.disabled=false; }
}
async function setTreatmentActive(id, active){
  if(!active && !confirm('Deactivate this treatment? Your AI will stop quoting it. You can reactivate it any time.')) return;
  try{
    const {error}=await supabaseClient.from('treatments').update({active}).eq('id',id);
    if(error){ toast('Could not update — '+error.message); return; }
    const t=allTreatments.find(x=>String(x.id)===String(id)); if(t) t.active=active;
    renderTreatments();
    toast(active?'Treatment reactivated ✓':'Treatment deactivated', 2000);
  }catch(e){ toast('Could not update — '+e.message); }
}

// ── TREATMENTS: import from booking platform (Fresha URL or pasted price list) ──
// Calls the import-treatments Edge Function twice by design: once with commit
// omitted to preview the cleaned list, and again with commit:true from the same
// source once the clinic confirms. The function re-fetches/re-cleans on commit
// rather than trusting a client-echoed treatment list.
let importPending = null;
function openImportModal(){
  importPending = null;
  document.getElementById('imUrl').value='';
  document.getElementById('imText').value='';
  const err=document.getElementById('imErr'); err.style.display='none'; err.textContent='';
  document.getElementById('imStepSource').style.display='block';
  document.getElementById('imStepPreview').style.display='none';
  const btn=document.getElementById('imPreviewBtn'); btn.disabled=false; btn.textContent='Preview import';
  document.getElementById('importModal').classList.add('open');
  setTimeout(()=>document.getElementById('imUrl').focus(),50);
}
function closeImportModal(){ document.getElementById('importModal').classList.remove('open'); }
function backToImportSource(){
  document.getElementById('imStepSource').style.display='block';
  document.getElementById('imStepPreview').style.display='none';
}
// Plain fetch with just Authorization+apikey (+Content-Type for the JSON body),
// matching every other Edge Function call in this dashboard (see IG_ACCOUNT_FN
// above) — supabaseClient.functions.invoke() adds extra headers (e.g.
// x-client-info) that aren't in these functions' CORS allowlist, which the
// browser blocks at preflight before the request ever reaches the function.
async function callImportTreatments(body){
  const {data:{session}} = await supabaseClient.auth.getSession();
  if(!session) throw new Error('Your session has expired — please sign in again.');
  const res = await fetch(SUPA_URL+'/functions/v1/import-treatments', {
    method:'POST',
    headers:{ 'Authorization':'Bearer '+session.access_token, 'apikey':ANON_KEY, 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok && !data.needs_fallback) throw new Error(data.error||('Request failed ('+res.status+')'));
  return data;
}
async function previewImport(){
  const err=document.getElementById('imErr'); err.style.display='none'; err.textContent='';
  const url=(document.getElementById('imUrl').value||'').trim();
  const text=(document.getElementById('imText').value||'').trim();
  if(!url && !text){ err.textContent='Enter a booking URL or paste a price list.'; err.style.display='block'; return; }
  const btn=document.getElementById('imPreviewBtn'); btn.disabled=true; btn.textContent='Fetching…';
  try{
    const body = url ? {url} : {text};
    const data = await callImportTreatments(body);
    btn.disabled=false; btn.textContent='Preview import';
    if(data?.error){ err.textContent=data.error; err.style.display='block'; return; }
    if(data?.needs_fallback){ err.textContent=data.message||'Try pasting the price list instead.'; err.style.display='block'; return; }
    const treatments = data?.treatments||[];
    if(!treatments.length){ err.textContent="Couldn't find any treatments to import."; err.style.display='block'; return; }
    importPending = url ? {url} : {text};
    document.getElementById('imPreviewSummary').textContent =
      `Found ${treatments.length} treatment${treatments.length===1?'':'s'}${data.cleanup && data.cleanup!=='claude' ? ' (basic cleanup — set ANTHROPIC_API_KEY for AI cleanup)' : ''}. Review below, then confirm to add them — this won't touch your existing treatments.`;
    document.getElementById('imPreviewList').innerHTML = treatments.map(t=>`
      <div class="treatment-card" style="margin-bottom:8px">
        <div class="treatment-name">${esc(t.treatment_name)}</div>
        <div class="treatment-price tnum">£${t.price_from||0}${t.price_to&&t.price_to!==t.price_from?' – £'+t.price_to:''}</div>
        <div class="treatment-meta">${t.duration_mins?`${t.duration_mins} mins<br>`:''}${t.description?esc(t.description):''}</div>
      </div>`).join('');
    document.getElementById('imStepSource').style.display='none';
    document.getElementById('imStepPreview').style.display='block';
  }catch(e){
    btn.disabled=false; btn.textContent='Preview import';
    err.textContent='Import failed — '+(e.message||'please try again'); err.style.display='block';
  }
}
async function confirmImport(){
  if(!importPending) return;
  const btn=document.getElementById('imConfirmBtn'); btn.disabled=true; btn.textContent='Importing…';
  try{
    const data = await callImportTreatments({...importPending, commit:true});
    btn.disabled=false; btn.textContent='Confirm import';
    if(data?.error){ toast('Import failed — '+data.error); return; }
    await refreshTreatments();
    closeImportModal();
    toast(`Imported ${data.inserted} treatment${data.inserted===1?'':'s'} ✓`, 2600);
  }catch(e){
    btn.disabled=false; btn.textContent='Confirm import';
    toast('Import failed — '+e.message);
  }
}
async function refreshTreatments(){
  const {data} = await supabaseClient.from('treatments').select('*').eq('clinic_id',clinicId)
    .order('active',{ascending:false}).order('treatment_name',{ascending:true});
  allTreatments = data||[];
  renderTreatments();
}

// ── SETTINGS ──
// Each preset's text is saved verbatim to clinics.ai_instructions. It's layered
// on top of the house system prompt in the Make DM engine, so keep it to VOICE /
// STYLE guidance, not a full prompt.
const TONE_PRESETS = {
  professional: {label:'Professional & clinical', text:"Speak with calm, professional authority, like an experienced aesthetics practitioner. Be precise and reassuring, prioritise safety and realistic expectations, and keep replies concise and polished. Minimal emoji."},
  warm:         {label:'Warm & friendly',        text:"Be warm, friendly and reassuring, like a caring receptionist who wants the client to feel looked after. Natural and approachable, a little light emoji is fine, and gently guide them toward booking without pressure."},
  chatty:       {label:'Chatty & personable',    text:"Be chatty, upbeat and personable, like texting a friend who happens to run a clinic. Relaxed and fun with contractions and the odd emoji, while staying clear on prices and booking."}
};
const IC_BUILDING = '<svg viewBox="0 0 24 24" fill="none"><path d="M3 21h18M6 21V7l6-4 6 4v14M10 9h1m3 0h1m-5 4h1m3 0h1m-5 4h1m3 0h1" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const IC_ROBOT = '<svg viewBox="0 0 24 24" fill="none"><rect x="4" y="7" width="16" height="12" rx="2" stroke-width="1.8"/><path d="M9 7V4m6 3V4M9 12v3m6-3v3" stroke-width="1.8" stroke-linecap="round"/></svg>';

function settingsSkeleton(){
  return `<div class="panel" style="margin-bottom:14px">
      <div class="sk" style="height:16px;width:140px;margin-bottom:22px"></div>
      <div class="sk" style="height:44px;margin-bottom:14px"></div>
      <div class="set-row"><div class="sk" style="height:44px"></div><div class="sk" style="height:44px"></div></div>
      <div class="sk" style="height:44px;margin-top:14px"></div>
    </div>
    <div class="panel">
      <div class="sk" style="height:16px;width:120px;margin-bottom:22px"></div>
      <div class="sk" style="height:44px;margin-bottom:14px"></div>
      <div class="sk" style="height:92px"></div>
    </div>`;
}

async function renderSettings(){
  const el=document.getElementById('tab-settings');
  const head=`<div class="page-title">Settings</div><div class="page-sub">Configure your business details and AI assistant.</div>`;
  el.innerHTML = head + settingsSkeleton();
  let c;
  try{
    // Explicit column list — never fetch page_access_token or billing fields to the browser
    const {data,error}=await supabaseClient.from('clinics')
      .select('clinic_name,booking_link,business_hours,avg_treatment_value,ai_instructions,clinic_knowledge,assistant_name')
      .eq('id',clinicId).single();
    if(error) throw error;
    c=data||{};
  }catch(e){
    el.innerHTML = head + `<div class="empty">${IC.inbox}<div>Couldn't load your settings — ${esc(e.message||'please try again')}.</div></div>`;
    return;
  }
  // Infer tone: exact match to a preset → select it; otherwise Custom with saved text
  const ai=(c.ai_instructions||'');
  let tone='custom';
  for(const k of ['professional','warm','chatty']){ if(ai.trim()===TONE_PRESETS[k].text){ tone=k; break; } }
  const customVal = tone==='custom' ? ai : '';
  const knowledgeVal = c.clinic_knowledge || '';
  const assistantVal = c.assistant_name || '';
  el.innerHTML = head + `
    <div class="panel" style="margin-bottom:14px">
      <div class="set-hd">${IC_BUILDING}<span class="panel-title">Business details</span></div>
      <div class="field"><label>Business name</label><input id="setName" type="text" value="${esc(c.clinic_name||'')}" placeholder="Your clinic name"></div>
      <div class="set-row">
        <div class="field"><label>Booking link</label><input id="setBooking" type="url" value="${esc(c.booking_link||'')}" placeholder="https://calendly.com/your-clinic"></div>
        <div class="field"><label>Average treatment value (£)</label><input id="setAvg" type="number" min="0" inputmode="numeric" value="${c.avg_treatment_value!=null?c.avg_treatment_value:''}" placeholder="250"></div>
      </div>
      <div class="field" style="margin-bottom:0"><label>Opening hours</label><input id="setHours" type="text" value="${esc(c.business_hours||'')}" placeholder="e.g. Mon–Sat 9am–6pm"></div>
    </div>
    <div class="panel" style="margin-bottom:14px">
      <div class="set-hd">${IC_ROBOT}<span class="panel-title">AI assistant</span></div>
      <div class="field">
        <label>Assistant name</label>
        <input id="setAssistant" type="text" value="${esc(assistantVal)}" placeholder="e.g. Ella, or your clinic's name">
        <div class="field-hint">Shown when the assistant introduces itself on the first message of a chat. Leave blank and it'll say "the clinic's assistant".</div>
      </div>
      <div class="field">
        <label>Tone</label>
        <select id="setTone" onchange="updateTonePreview()">
          <option value="professional"${tone==='professional'?' selected':''}>Professional & clinical</option>
          <option value="warm"${tone==='warm'?' selected':''}>Warm & friendly</option>
          <option value="chatty"${tone==='chatty'?' selected':''}>Chatty & personable</option>
          <option value="custom"${tone==='custom'?' selected':''}>Custom</option>
        </select>
        <div class="tone-preview" id="tonePreview"></div>
      </div>
      <div class="field">
        <label>Custom AI instructions</label>
        <textarea id="setCustom" rows="4" oninput="updateTonePreview()" placeholder="Write your own voice &amp; style guidance for the AI…">${esc(customVal)}</textarea>
        <div class="field-hint">If filled in, this overrides the tone preset entirely.</div>
      </div>
      <div class="field" style="margin-bottom:0">
        <label>Clinic knowledge &amp; FAQ</label>
        <textarea id="setKnowledge" rows="6" placeholder="Anything specific to your clinic the AI should know — brands you use, practitioner credentials, financing/deposits, cancellation policy, parking, common FAQs, what makes you different…">${esc(knowledgeVal)}</textarea>
        <div class="field-hint">The AI uses this as authoritative info about your clinic when answering DMs. It never invents details that aren't here or in your treatments.</div>
      </div>
    </div>
    <div class="set-actions">
      <button class="btn-primary" id="setSaveBtn" onclick="saveSettings()">Save changes</button>
    </div>`;
  updateTonePreview();
}

function updateTonePreview(){
  const sel=document.getElementById('setTone'); if(!sel) return;
  const p=document.getElementById('tonePreview'); if(!p) return;
  const custom=(document.getElementById('setCustom')?.value||'').trim();
  if(custom){ p.textContent='Your custom instructions below will be used instead of the preset.'; return; }
  const t=sel.value;
  p.textContent = t==='custom' ? 'Add your own instructions below, or pick a tone preset.' : TONE_PRESETS[t].text;
}

async function saveSettings(){
  const name=(document.getElementById('setName').value||'').trim();
  if(!name){ toast('Business name is required.'); document.getElementById('setName').focus(); return; }
  const avgRaw=(document.getElementById('setAvg').value||'').trim();
  let avg=null;
  if(avgRaw!==''){ const n=Math.round(Number(avgRaw)); if(isNaN(n)||n<0){ toast('Average treatment value must be a non-negative number.'); return; } avg=n; }
  const booking=(document.getElementById('setBooking').value||'').trim();
  const hours=(document.getElementById('setHours').value||'').trim();
  const tone=document.getElementById('setTone').value;
  const custom=(document.getElementById('setCustom').value||'').trim();
  const knowledge=(document.getElementById('setKnowledge')?.value||'').trim();
  const assistant=(document.getElementById('setAssistant')?.value||'').trim();
  // Custom overrides the preset if filled; else save the selected preset's text
  const ai = custom ? custom : (tone==='custom' ? '' : TONE_PRESETS[tone].text);
  const btn=document.getElementById('setSaveBtn'); btn.disabled=true;
  try{
    const {error}=await supabaseClient.rpc('update_my_clinic_settings',{
      p_clinic_name:name, p_booking_link:booking||null, p_business_hours:hours||null,
      p_avg_treatment_value:avg, p_ai_instructions:ai||null, p_clinic_knowledge:knowledge,
      p_assistant_name:assistant
    });
    if(error){ btn.disabled=false; toast('Could not save — '+error.message); return; }
    // Reflect the fields the rest of the dashboard uses, without a reload
    if(clinicData){ clinicData.clinic_name=name; clinicData.avg_treatment_value=avg; }
    const sc=document.getElementById('sbClinic'); if(sc) sc.textContent=name;
    renderOverview();
    btn.disabled=false;
    toast('Settings saved ✓', 2000);
  }catch(e){ btn.disabled=false; toast('Could not save — '+e.message); }
}

// ── ACCOUNT (connected Instagram business account) ──
// The Instagram access token stays server-side. This calls the ig-account Edge
// Function with the logged-in user's JWT; the function resolves their clinic,
// reads the token with the service role, calls the Instagram Graph API, and
// returns ONLY public profile + media. This is what demonstrates the
// instagram_business_basic permission (handle/ID, live profile, media list).
const IG_ACCOUNT_FN = SUPA_URL + '/functions/v1/ig-account';

function fmtCount(n){
  if(n==null||isNaN(n)) return '—';
  n=Number(n);
  if(n>=1e6) return (n/1e6).toFixed(n>=1e7?0:1).replace(/\.0$/,'')+'M';
  if(n>=1e4) return (n/1e3).toFixed(n>=1e5?0:1).replace(/\.0$/,'')+'K';
  return n.toLocaleString('en-GB');
}

async function renderAccount(){
  const el=document.getElementById('tab-account');
  const head=`<div class="page-title">Instagram account</div><div class="page-sub">The Instagram business account connected to ${esc(clinicData?.clinic_name||'your clinic')}, as seen by your AI receptionist.</div>`;
  el.innerHTML = head + accountSkeleton();
  let payload;
  try{
    const {data:{session}}=await supabaseClient.auth.getSession();
    if(!session) throw new Error('Your session has expired — please sign in again.');
    const res=await fetch(IG_ACCOUNT_FN,{
      headers:{ 'Authorization':'Bearer '+session.access_token, 'apikey':ANON_KEY }
    });
    payload=await res.json().catch(()=>({}));
    if(!res.ok && !payload.not_connected){
      throw new Error(payload.error||('Request failed ('+res.status+')'));
    }
  }catch(e){
    el.innerHTML = head + `<div class="empty">${IC.inbox}<div>Couldn't load your Instagram account — ${esc(e.message||'please try again')}.</div></div>`;
    return;
  }
  if(payload.not_connected){ el.innerHTML = head + accountNotConnected(); return; }
  el.innerHTML = head + accountCard(payload.profile||{}) + mediaPanel(payload.media||[]);
}

// If Instagram's CDN avatar URL fails to load, swap in the gradient initial.
function acctAvatarError(img){
  const d=document.createElement('div');
  d.className='acct-avatar-fallback';
  d.textContent=img.dataset.initial||'?';
  img.replaceWith(d);
}

function accountCard(p){
  const handle = p.username ? '@'+esc(p.username) : (p.name?esc(p.name):'Connected account');
  const initial = (p.username||p.name||'?').trim().charAt(0).toUpperCase();
  const avatar = p.profile_picture_url
    ? `<img class="acct-avatar" src="${esc(p.profile_picture_url)}" data-initial="${esc(initial)}" alt="" onerror="acctAvatarError(this)">`
    : `<div class="acct-avatar-fallback">${esc(initial)}</div>`;
  const idVal = p.id!=null ? esc(String(p.id)) : '—';
  return `
    <div class="panel" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:18px">
        <span class="acct-conn"><span class="dot"></span>Connected</span>
      </div>
      <div class="acct-card">
        ${avatar}
        <div class="acct-id">
          <div class="acct-handle">${handle}</div>
          ${p.name?`<div class="acct-name">${esc(p.name)}</div>`:''}
          <div class="acct-idrow">Instagram ID · ${idVal}</div>
        </div>
      </div>
      ${p.biography?`<div class="acct-bio">${esc(p.biography)}</div>`:''}
      <div class="acct-stats">
        <div class="acct-stat"><div class="num tnum">${fmtCount(p.followers_count)}</div><div class="lbl">Followers</div></div>
        <div class="acct-stat"><div class="num tnum">${fmtCount(p.media_count)}</div><div class="lbl">Posts</div></div>
      </div>
    </div>`;
}

function mediaPanel(media){
  const cells = (media||[]).slice(0,9).map(m=>{
    const isVideo = m.media_type==='VIDEO';
    const src = (isVideo ? m.thumbnail_url : m.media_url) || m.thumbnail_url || m.media_url;
    if(!src) return '';
    const cap = m.caption ? esc(m.caption.length>80?m.caption.slice(0,77)+'…':m.caption) : '';
    const tag = m.media_type==='CAROUSEL_ALBUM' ? 'Album' : (isVideo ? 'Video' : '');
    return `<a class="media-cell" href="${esc(m.permalink||'#')}" target="_blank" rel="noopener">
      <img src="${esc(src)}" alt="" loading="lazy">
      ${tag?`<span class="media-tag">${tag}</span>`:''}
      ${cap?`<div class="media-cap">${cap}</div>`:''}
    </a>`;
  }).join('');
  return `
    <div class="panel">
      <div class="set-hd" style="margin-bottom:4px"><span class="panel-title">Recent posts</span></div>
      ${cells
        ? `<div class="media-grid">${cells}</div>`
        : `<div class="empty">${IC.inbox}<div>No posts to show for this account yet.</div></div>`}
    </div>`;
}

function accountNotConnected(){
  return `<div class="panel">
    <div class="empty" style="padding:48px 40px">
      ${IC.inbox}
      <div style="font-weight:600;color:var(--ink-2);font-size:15px;margin-bottom:6px">No Instagram account connected yet</div>
      <div style="margin-bottom:22px">Connect your Instagram business account to let your AI receptionist read and reply to your DMs. Your handle, live profile and recent posts will then appear here.</div>
      <button class="btn-primary" id="igConnectBtn" onclick="igConnect(this)" style="display:inline-flex;align-items:center;gap:8px;padding:11px 18px">
        <svg viewBox="0 0 24 24" fill="none" style="width:17px;height:17px"><rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.9"/><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.9"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor"/></svg>
        Connect Instagram
      </button>
    </div>
  </div>`;
}

// Kick off the OAuth connect flow: ask ig-connect-start for the authorize URL
// (authenticated by the logged-in user's JWT), then redirect the browser to it.
async function igConnect(btn){
  if(btn){ btn.disabled=true; btn.style.opacity='.6'; }
  try{
    const { data:{ session } } = await supabaseClient.auth.getSession();
    if(!session) throw new Error('Your session has expired — please sign in again.');
    const res = await fetch(SUPA_URL+'/functions/v1/ig-connect-start', {
      method:'POST',
      headers:{ 'Authorization':'Bearer '+session.access_token, 'apikey':ANON_KEY }
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok || !data.url) throw new Error(data.error||('Could not start connect ('+res.status+')'));
    window.location.href = data.url;
  }catch(e){
    if(btn){ btn.disabled=false; btn.style.opacity='1'; }
    toast('Couldn\'t start Instagram connect — '+(e.message||'please try again'));
  }
}

function accountSkeleton(){
  return `<div class="panel" style="margin-bottom:14px">
      <div class="acct-card">
        <div class="sk" style="width:84px;height:84px;border-radius:50%"></div>
        <div style="flex:1;min-width:0">
          <div class="sk" style="height:22px;width:180px;margin-bottom:10px"></div>
          <div class="sk" style="height:13px;width:130px;margin-bottom:8px"></div>
          <div class="sk" style="height:12px;width:220px"></div>
        </div>
      </div>
      <div class="sk" style="height:40px;margin-top:16px"></div>
      <div class="acct-stats"><div class="sk" style="height:38px;width:80px"></div><div class="sk" style="height:38px;width:80px"></div></div>
    </div>
    <div class="panel">
      <div class="sk" style="height:15px;width:120px;margin-bottom:16px"></div>
      <div class="media-grid">${Array.from({length:9}).map(()=>`<div class="sk" style="aspect-ratio:1;border-radius:10px"></div>`).join('')}</div>
    </div>`;
}

// ── TABS ──
const TABS = ['overview','leads','conversations','treatments','account','settings'];
function showTab(name,btn){
  TABS.forEach(t=>{
    const el=document.getElementById('tab-'+t);
    el.style.display=t===name?'block':'none';
    if(t===name){ el.classList.remove('tab-enter'); void el.offsetWidth; el.classList.add('tab-enter'); }
  });
  // sidebar active state
  document.querySelectorAll('.sb-link').forEach((b,i)=>b.classList.toggle('active', TABS[i]===name));
  document.querySelectorAll('.mnav button').forEach((b,i)=>b.classList.toggle('active', TABS[i]===name));
  if(name==='conversations') renderConversations();
  if(name==='settings') renderSettings();
  if(name==='account') renderAccount();
}
</script>
